<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyJournal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Journal</h1>
    <div id="journalContainter">

        <div class="create-box">
            <input type="text" id="titleInput" placeholder="Title of the note">
            <textarea  type="text" id="contentInput" placeholder="Content of the note"></textarea>
            <button id="addNoteBtn">Add the Note</button>
        </div>

        <div class="search-box">
            <div id="searchTheTitle">
                <input type="text" id="searchInput" placeholder="Find your Title...">
                <button id="searchBtn">Search</button>
            </div>
            <div id="filterByDate">
                <input type="date" id="filterDate" placeholder="dd.mm.yyyy">
                <button id="filterBtn">Filter by Date</button>
            </div>
        </div>
        
        <div id="noteResult"></div>
        <div id="message"></div>

    </div>

    <script src="app.js"></script>
</body>
</html>
